<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f6f7fb" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="MSTY 1000" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon-192.png" sizes="192x192" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>MSTY PROJECT 1000 · V1.1</title>
  <meta name="color-scheme" content="light dark" />
  <script>
    (() => {
      try {
        const pref = localStorage.getItem('msty-theme-pref') || 'system';
        const dark = pref === 'dark' || (pref === 'system' && matchMedia('(prefers-color-scheme: dark)').matches);
        document.documentElement.dataset.theme = dark ? 'dark' : 'light';
      } catch (_) {
        document.documentElement.dataset.theme = 'light';
      }
    })();
  </script>
  <style>
    :root {
      --bg: #f4f5f9;
      --surface: rgba(255,255,255,.92);
      --surface-strong: #ffffff;
      --text: #171821;
      --muted: #7a7f8d;
      --line: #e8eaf0;
      --accent: #645bff;
      --accent-2: #8a7dff;
      --accent-soft: #efedff;
      --green: #19a974;
      --green-soft: #e9f8f2;
      --yellow: #d79b18;
      --yellow-soft: #fff6dd;
      --red: #e65353;
      --red-soft: #fff0f0;
      --shadow: 0 14px 36px rgba(32,35,52,.08);
      --radius-xl: 24px;
      --radius-lg: 19px;
      --radius-md: 15px;
      --nav-h: 78px;
    }

    * { box-sizing: border-box; }
    html { background: var(--bg); }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", Arial, sans-serif;
      background:
        radial-gradient(circle at 90% -10%, rgba(100,91,255,.12), transparent 34%),
        radial-gradient(circle at -10% 10%, rgba(25,169,116,.08), transparent 28%),
        var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
    }

    button, input, select, textarea { font: inherit; }
    button { -webkit-tap-highlight-color: transparent; }

    .app {
      width: min(100%, 760px);
      margin: 0 auto;
      min-height: 100vh;
      padding: env(safe-area-inset-top) 16px calc(var(--nav-h) + env(safe-area-inset-bottom) + 22px);
      position: relative;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 20px 4px 14px;
    }

    .brand-wrap { min-width: 0; }
    .eyebrow {
      font-size: 11px;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: .14em;
      text-transform: uppercase;
      margin-bottom: 5px;
    }
    .brand {
      margin: 0;
      font-size: clamp(24px, 5vw, 31px);
      line-height: 1.06;
      letter-spacing: -.045em;
    }
    .brand span { color: var(--accent); }
    .save-pill {
      flex: 0 0 auto;
      min-width: 76px;
      padding: 9px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,.75);
      border: 1px solid rgba(255,255,255,.9);
      box-shadow: 0 5px 18px rgba(35,38,52,.06);
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-align: center;
      backdrop-filter: blur(12px);
    }

    .page { display: none; animation: pageIn .24s ease both; }
    .page.active { display: block; }
    @keyframes pageIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: none; } }

    .stack { display: grid; gap: 14px; }
    .section-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 23px 2px 10px;
    }
    .section-title-row:first-child { margin-top: 4px; }
    .section-title {
      margin: 0;
      font-size: 18px;
      letter-spacing: -.025em;
    }
    .section-note { color: var(--muted); font-size: 12px; }

    .card {
      border-radius: var(--radius-xl);
      background: var(--surface);
      border: 1px solid rgba(255,255,255,.96);
      box-shadow: var(--shadow);
      padding: 19px;
      overflow: hidden;
      position: relative;
      backdrop-filter: blur(16px);
    }
    .card::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      border-radius: inherit;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.72);
    }
    .card.compact { padding: 16px 17px; }
    .card.accent {
      color: white;
      background:
        radial-gradient(circle at 92% 0%, rgba(255,255,255,.19), transparent 35%),
        linear-gradient(145deg, #5e55f4, #7669ff 58%, #8d7fff);
      border-color: rgba(255,255,255,.18);
      box-shadow: 0 18px 42px rgba(100,91,255,.25);
    }
    .card.green {
      background:
        radial-gradient(circle at 95% -20%, rgba(255,255,255,.25), transparent 40%),
        linear-gradient(145deg, #168b64, #22ad7b 60%, #37bf8c);
      color: white;
      border-color: rgba(255,255,255,.16);
      box-shadow: 0 18px 42px rgba(25,169,116,.22);
    }
    .card.warning { background: var(--yellow-soft); border-color: #ffe8a7; }
    .card.danger { background: var(--red-soft); border-color: #ffd4d4; }

    .card-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
      margin-bottom: 16px;
    }
    .card-title {
      font-size: 14px;
      color: var(--muted);
      font-weight: 800;
      letter-spacing: -.01em;
    }
    .card.accent .card-title, .card.green .card-title { color: rgba(255,255,255,.74); }
    .big-number {
      font-size: clamp(27px, 7vw, 40px);
      line-height: 1;
      font-weight: 850;
      letter-spacing: -.055em;
      word-break: break-word;
    }
    .sub-number { font-size: 13px; color: var(--muted); margin-top: 7px; font-weight: 650; }
    .krw-ref {
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
      font-weight: 720;
      letter-spacing: -.01em;
    }
    .krw-ref.mini { margin-top: 4px; font-size: 10px; font-weight: 680; }
    .krw-ref.inline { display: inline; margin: 0 0 0 4px; font-size: inherit; }
    .krw-ref.positive { color: var(--green); }
    .krw-ref.negative { color: var(--red); }
    .row-krw { margin-top: 3px; color: var(--muted); font-size: 10px; font-weight: 680; text-align: right; }
    .milestone .krw-ref { margin-top: 3px; }
    .card.accent .sub-number, .card.green .sub-number { color: rgba(255,255,255,.72); }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 17px;
    }
    .metric {
      min-width: 0;
      padding: 13px 14px;
      border-radius: var(--radius-md);
      background: #f7f7fa;
      border: 1px solid #f0f1f5;
    }
    .card.accent .metric, .card.green .metric {
      background: rgba(255,255,255,.12);
      border-color: rgba(255,255,255,.12);
    }
    .metric-label { font-size: 11px; color: var(--muted); font-weight: 750; margin-bottom: 6px; }
    .card.accent .metric-label, .card.green .metric-label { color: rgba(255,255,255,.7); }
    .metric-value { font-size: 16px; font-weight: 820; letter-spacing: -.025em; overflow-wrap: anywhere; }
    .metric-value.small { font-size: 14px; }

    .positive { color: var(--green); }
    .negative { color: var(--red); }
    .card.accent .positive, .card.green .positive { color: #c9ffe8; }
    .card.accent .negative, .card.green .negative { color: #ffd5d5; }

    .progress-wrap { margin-top: 18px; }
    .progress-meta { display: flex; justify-content: space-between; gap: 10px; font-size: 12px; font-weight: 750; margin-bottom: 8px; }
    .progress-track {
      height: 9px;
      border-radius: 999px;
      background: #ececf3;
      overflow: hidden;
    }
    .card.accent .progress-track, .card.green .progress-track { background: rgba(255,255,255,.18); }
    .progress-fill {
      height: 100%;
      border-radius: inherit;
      width: 0;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      transition: width .55s cubic-bezier(.2,.8,.2,1);
    }
    .card.accent .progress-fill, .card.green .progress-fill { background: white; }
    .progress-fill.green { background: linear-gradient(90deg, #0fa86e, #43cf9a); }
    .progress-fill.yellow { background: linear-gradient(90deg, #e5a727, #ffc64a); }
    .progress-fill.red { background: linear-gradient(90deg, #eb5c5c, #ff7a7a); }

    details.clean { border-top: 1px solid var(--line); margin-top: 15px; padding-top: 6px; }
    details.clean summary {
      list-style: none;
      cursor: pointer;
      user-select: none;
      display: flex;
      justify-content: space-between;
      align-items: center;
      min-height: 43px;
      font-size: 13px;
      color: var(--muted);
      font-weight: 750;
    }
    details.clean summary::-webkit-details-marker { display: none; }
    .chev { transition: transform .2s ease; }
    details[open] .chev { transform: rotate(180deg); }

    .action-row { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    .btn {
      min-height: 48px;
      border: 0;
      border-radius: 16px;
      padding: 12px 15px;
      font-weight: 820;
      cursor: pointer;
      transition: transform .12s ease, box-shadow .18s ease, opacity .18s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-decoration: none;
    }
    .btn:active { transform: scale(.975); }
    .btn.primary { background: var(--accent); color: white; box-shadow: 0 9px 20px rgba(100,91,255,.22); }
    .btn.secondary { background: var(--accent-soft); color: var(--accent); }
    .btn.soft { background: #f1f2f6; color: #4c5060; }
    .btn.green { background: var(--green); color: white; }
    .btn.danger { background: var(--red); color: white; }
    .btn.outline { background: transparent; color: var(--text); border: 1px solid var(--line); }
    .btn.small { min-height: 38px; padding: 8px 12px; border-radius: 13px; font-size: 12px; }
    .btn.icon { min-width: 44px; padding-inline: 11px; }
    .btn:disabled { opacity: .42; cursor: not-allowed; box-shadow: none; }

    .recent-box { padding: 0; }
    .recent-content { display: none; }
    .recent-content.show { display: block; animation: chartIn .18s ease both; }
    .recent-toggle {
      width: 100%;
      border: 0;
      background: transparent;
      padding: 17px 18px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      cursor: pointer;
      text-align: left;
    }
    .recent-toggle:active { background: rgba(100,91,255,.035); }
    .recent-label { font-size: 13px; color: var(--muted); font-weight: 800; }
    .recent-main { font-size: 15px; font-weight: 800; margin-top: 5px; line-height: 1.35; }
    .recent-side { color: var(--muted); font-size: 18px; transition: transform .2s ease; }
    .recent-box.expanded .recent-side { transform: rotate(180deg); }
    .list { border-top: 1px solid var(--line); }
    .list-row {
      display: grid;
      grid-template-columns: minmax(0,1fr) auto;
      gap: 12px;
      align-items: center;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      animation: listIn .18s ease both;
    }
    @keyframes listIn { from { opacity: 0; transform: translateY(-2px); } to { opacity: 1; transform: none; } }
    .list-row:last-child { border-bottom: 0; }
    .row-title { font-weight: 800; font-size: 14px; line-height: 1.35; }
    .row-sub { color: var(--muted); font-size: 12px; margin-top: 4px; line-height: 1.4; }
    .row-value { text-align: right; font-weight: 850; font-size: 14px; white-space: nowrap; }
    .row-actions { display: flex; gap: 5px; justify-content: flex-end; margin-top: 7px; }
    .mini-icon {
      border: 0;
      border-radius: 10px;
      background: #f0f1f5;
      color: #555a68;
      min-width: 31px;
      min-height: 31px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 800;
    }
    .mini-icon.delete { background: var(--red-soft); color: var(--red); }
    .more-row { display: flex; gap: 8px; padding: 12px 18px 17px; border-top: 1px solid var(--line); }
    .more-row .btn { flex: 1; }

    .empty {
      padding: 24px 18px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.65;
    }

    .segmented {
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: 1fr;
      gap: 4px;
      padding: 4px;
      border-radius: 15px;
      background: #eaeaf0;
    }
    .segmented button {
      min-height: 38px;
      border: 0;
      border-radius: 11px;
      background: transparent;
      color: var(--muted);
      font-weight: 800;
      cursor: pointer;
    }
    .segmented button.active { background: white; color: var(--text); box-shadow: 0 4px 12px rgba(40,42,58,.08); }

    .filter-row { display: grid; grid-template-columns: minmax(0, 1fr) minmax(150px, 1.2fr); gap: 10px; }
    .select, .input {
      width: 100%;
      min-height: 48px;
      border: 1px solid var(--line);
      background: white;
      color: var(--text);
      border-radius: 15px;
      padding: 11px 13px;
      outline: none;
      transition: border-color .15s ease, box-shadow .15s ease;
    }
    .select:focus, .input:focus { border-color: rgba(100,91,255,.6); box-shadow: 0 0 0 4px rgba(100,91,255,.09); }
    textarea.input { min-height: 90px; resize: vertical; }
    .input-label { display: block; font-size: 12px; color: var(--muted); font-weight: 800; margin: 0 0 7px 2px; }
    .input-hint { color: var(--muted); font-size: 11px; line-height: 1.5; margin: 7px 2px 0; }
    .form-grid { display: grid; gap: 14px; }
    .form-grid.two { grid-template-columns: repeat(2, minmax(0,1fr)); }

    .summary-grid { display: grid; grid-template-columns: repeat(2,minmax(0,1fr)); gap: 9px; }
    .summary-chip { padding: 13px; border-radius: 15px; background: #f7f7fa; border: 1px solid #eff0f4; }
    .summary-chip .label { font-size: 11px; color: var(--muted); font-weight: 750; }
    .summary-chip .value { margin-top: 6px; font-size: 16px; font-weight: 850; }

    .chart-toggle {
      width: 100%;
      min-height: 50px;
      margin-top: 14px;
      padding: 0 4px;
      border: 0;
      border-top: 1px solid var(--line);
      background: transparent;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      font-weight: 850;
      cursor: pointer;
    }
    .chart-toggle .chart-copy { display: grid; gap: 3px; text-align: left; }
    .chart-toggle .chart-sub { color: var(--muted); font-size: 11px; font-weight: 700; }
    .chart-toggle .chev { color: var(--muted); transition: transform .2s ease; }
    .chart-toggle.open .chev { transform: rotate(180deg); }
    .chart-panel { display: none; padding-top: 3px; animation: chartIn .2s ease both; }
    .chart-panel.show { display: block; }
    @keyframes chartIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }

    .bars { display: grid; gap: 10px; margin-top: 15px; }
    .bar-row { display: grid; grid-template-columns: 68px minmax(0,1fr) auto; gap: 10px; align-items: center; }
    .bar-label { font-size: 12px; color: var(--muted); font-weight: 750; }
    .bar-track { height: 9px; border-radius: 999px; background: #eeeeF4; overflow: hidden; }
    .bar-fill { height: 100%; background: linear-gradient(90deg,var(--accent),var(--accent-2)); border-radius: inherit; min-width: 2px; }
    .bar-value { font-size: 12px; font-weight: 800; }

    .roadmap { display: grid; gap: 10px; }
    .milestone {
      display: grid;
      grid-template-columns: 45px minmax(0,1fr) auto;
      gap: 12px;
      align-items: center;
      padding: 14px;
      border-radius: 17px;
      background: #f7f7fa;
      border: 1px solid #eff0f4;
    }
    .milestone-dot {
      width: 42px; height: 42px; border-radius: 14px;
      display: grid; place-items: center;
      background: #e9e8ff; color: var(--accent); font-weight: 900; font-size: 12px;
    }
    .milestone.done { background: var(--green-soft); border-color: #d8f1e7; }
    .milestone.done .milestone-dot { background: var(--green); color: white; }
    .milestone-title { font-weight: 850; font-size: 14px; }
    .milestone-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }
    .status-pill { border-radius: 999px; padding: 7px 9px; font-size: 11px; font-weight: 850; background: #ececf2; color: var(--muted); }
    .milestone.done .status-pill { background: white; color: var(--green); }

    .settings-group { display: grid; gap: 13px; }
    .setting-row {
      display: grid;
      grid-template-columns: minmax(0,1fr) minmax(125px, 44%);
      gap: 12px;
      align-items: center;
    }
    .setting-title { font-size: 14px; font-weight: 820; }
    .setting-desc { color: var(--muted); font-size: 11px; margin-top: 4px; line-height: 1.45; }

    .switch { position: relative; display: inline-flex; align-items: center; justify-content: flex-end; }
    .switch input { position: absolute; opacity: 0; pointer-events: none; }
    .switch-ui { width: 52px; height: 30px; border-radius: 999px; background: #dfe1e7; padding: 3px; transition: .2s ease; cursor: pointer; }
    .switch-ui::after { content:""; display:block; width:24px; height:24px; background:white; border-radius:50%; box-shadow:0 3px 8px rgba(0,0,0,.16); transition:.2s ease; }
    .switch input:checked + .switch-ui { background: var(--accent); }
    .switch input:checked + .switch-ui::after { transform: translateX(22px); }

    .check-list { display: grid; gap: 8px; margin-top: 12px; }
    .check-item { padding: 11px 12px; border-radius: 13px; background: var(--red-soft); color: #a83737; font-size: 12px; font-weight: 700; line-height: 1.5; }
    .check-ok { padding: 16px; border-radius: 15px; background: var(--green-soft); color: #08784f; font-weight: 800; text-align: center; }

    .bottom-nav {
      position: fixed;
      z-index: 30;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      width: min(100%, 760px);
      min-height: calc(var(--nav-h) + env(safe-area-inset-bottom));
      padding: 8px 12px calc(8px + env(safe-area-inset-bottom));
      background: rgba(250,250,252,.91);
      backdrop-filter: blur(22px) saturate(1.25);
      border-top: 1px solid rgba(224,225,232,.85);
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 2px;
      box-shadow: 0 -12px 35px rgba(24,26,39,.07);
    }
    .nav-btn {
      border: 0;
      border-radius: 15px;
      min-height: 58px;
      background: transparent;
      color: #9397a3;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      cursor: pointer;
      font-size: 10px;
      font-weight: 800;
      transition: color .16s ease, background .16s ease, transform .12s ease;
    }
    .nav-btn:active { transform: scale(.96); }
    .nav-btn.active { color: var(--accent); background: rgba(100,91,255,.085); }
    .nav-btn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(20,21,30,.42);
      backdrop-filter: blur(8px);
      padding: 18px;
      display: none;
      align-items: flex-end;
      justify-content: center;
    }
    .modal-backdrop.show { display: flex; animation: fadeIn .16s ease both; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .modal {
      width: min(100%, 620px);
      max-height: min(90vh, 820px);
      overflow: auto;
      background: #fff;
      border-radius: 26px 26px 20px 20px;
      box-shadow: 0 30px 80px rgba(0,0,0,.24);
      padding: 19px;
      animation: modalUp .22s cubic-bezier(.2,.8,.2,1) both;
    }
    @keyframes modalUp { from { transform: translateY(24px); opacity: .4; } to { transform: none; opacity: 1; } }
    .modal-handle { width: 42px; height: 5px; background: #dedfe5; border-radius: 999px; margin: 0 auto 17px; }
    .modal-title { font-size: 21px; margin: 0; letter-spacing: -.035em; }
    .modal-desc { color: var(--muted); font-size: 12px; line-height: 1.6; margin: 7px 0 18px; }
    .modal-actions { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 9px; margin-top: 19px; }

    .toast {
      position: fixed;
      z-index: 200;
      left: 50%;
      bottom: calc(var(--nav-h) + env(safe-area-inset-bottom) + 18px);
      transform: translate(-50%, 16px);
      background: rgba(26,27,35,.92);
      color: white;
      border-radius: 999px;
      padding: 11px 16px;
      font-size: 12px;
      font-weight: 750;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s ease, transform .2s ease;
      white-space: nowrap;
      max-width: calc(100vw - 36px);
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .toast.show { opacity: 1; transform: translate(-50%, 0); }

    .divider { height: 1px; background: var(--line); margin: 16px 0; }
    .muted { color: var(--muted); }
    .tiny { font-size: 11px; line-height: 1.5; }
    .center { text-align: center; }
    .nowrap { white-space: nowrap; }
    .hidden { display: none !important; }

    @media (min-width: 680px) {
      .app { padding-left: 24px; padding-right: 24px; }
      .home-grid { display: grid; grid-template-columns: repeat(2,minmax(0,1fr)); gap: 14px; align-items: start; }
      .home-grid .wide { grid-column: 1 / -1; }
      .modal-backdrop { align-items: center; }
      .modal { border-radius: 26px; }
    }
    @media (max-width: 430px) {
      .metric-grid, .summary-grid, .form-grid.two { grid-template-columns: 1fr 1fr; }
      .filter-row { grid-template-columns: 1fr; }
      .setting-row { grid-template-columns: 1fr; }
      .setting-row .switch { justify-content: flex-start; }
      .modal-actions { grid-template-columns: 1fr; }
    }


    /* V1.0 visual polish */
    html[data-theme="dark"] {
      color-scheme: dark;
      --bg: #0f1117;
      --surface: rgba(27,30,38,.92);
      --surface-strong: #1b1e26;
      --text: #f3f4f7;
      --muted: #9da3b1;
      --line: #2d313c;
      --accent: #8a82ff;
      --accent-2: #a79fff;
      --accent-soft: #282544;
      --green: #35c995;
      --green-soft: #17382d;
      --yellow: #f0bc4d;
      --yellow-soft: #3b3019;
      --red: #ff7272;
      --red-soft: #3d2226;
      --shadow: 0 16px 42px rgba(0,0,0,.28);
    }
    html[data-theme="dark"] body {
      background:
        radial-gradient(circle at 90% -10%, rgba(138,130,255,.16), transparent 34%),
        radial-gradient(circle at -10% 10%, rgba(53,201,149,.08), transparent 28%),
        var(--bg);
    }
    html[data-theme="dark"] .save-pill {
      background: rgba(27,30,38,.78);
      border-color: rgba(255,255,255,.06);
      box-shadow: 0 7px 20px rgba(0,0,0,.2);
    }
    html[data-theme="dark"] .card {
      border-color: rgba(255,255,255,.055);
    }
    html[data-theme="dark"] .card::after { box-shadow: inset 0 1px 0 rgba(255,255,255,.045); }
    html[data-theme="dark"] .metric,
    html[data-theme="dark"] .summary-chip,
    html[data-theme="dark"] .milestone {
      background: #20232c;
      border-color: #2c303b;
    }
    html[data-theme="dark"] .milestone.done { background: var(--green-soft); border-color: #23533f; }
    html[data-theme="dark"] .milestone.done .status-pill { background: #222a27; }
    html[data-theme="dark"] .select,
    html[data-theme="dark"] .input {
      background: #181b22;
      color: var(--text);
      border-color: #333744;
    }
    html[data-theme="dark"] .segmented { background: #15171d; }
    html[data-theme="dark"] .segmented button.active {
      background: #2b2f3a;
      color: var(--text);
      box-shadow: 0 4px 13px rgba(0,0,0,.28);
    }
    html[data-theme="dark"] .btn.soft,
    html[data-theme="dark"] .mini-icon { background: #272b35; color: #d6d9e1; }
    html[data-theme="dark"] .btn.outline { color: var(--text); }
    html[data-theme="dark"] .bar-track,
    html[data-theme="dark"] .progress-track { background: #2a2e39; }
    html[data-theme="dark"] .bottom-nav {
      background: rgba(18,20,26,.92);
      border-top-color: rgba(255,255,255,.07);
      box-shadow: 0 -14px 38px rgba(0,0,0,.25);
    }
    html[data-theme="dark"] .nav-btn.active { background: rgba(138,130,255,.13); }
    html[data-theme="dark"] .modal { background: #1b1e26; }
    html[data-theme="dark"] .modal-handle { background: #3d424e; }
    html[data-theme="dark"] .toast { background: rgba(244,245,248,.94); color: #171821; }
    html[data-theme="dark"] .check-item { color: #ffb7b7; }
    html[data-theme="dark"] .check-ok { color: #8ee7c5; }

    .splash-screen {
      position: fixed;
      inset: 0;
      z-index: 500;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 70% 25%, rgba(100,91,255,.16), transparent 32%),
        radial-gradient(circle at 25% 75%, rgba(25,169,116,.08), transparent 30%),
        var(--bg);
      color: var(--text);
      transition: opacity .22s ease, visibility .22s ease;
    }
    .splash-screen.hide { opacity: 0; visibility: hidden; pointer-events: none; }
    .splash-inner { display: grid; justify-items: center; gap: 13px; transform: translateY(-2vh); }
    .splash-mark {
      width: 74px;
      height: 74px;
      border-radius: 23px;
      display: grid;
      place-items: center;
      color: white;
      background: linear-gradient(145deg, #5e55f4, #8d7fff);
      box-shadow: 0 20px 48px rgba(100,91,255,.3);
      font-size: 28px;
      font-weight: 950;
      letter-spacing: -.07em;
      animation: splashPulse 1.25s ease-in-out infinite;
    }
    .splash-title { font-size: 21px; font-weight: 900; letter-spacing: -.04em; }
    .splash-title span { color: var(--accent); }
    .splash-sub { color: var(--muted); font-size: 11px; font-weight: 750; letter-spacing: .08em; text-transform: uppercase; }
    .splash-line { width: 72px; height: 3px; border-radius: 99px; background: var(--line); overflow: hidden; margin-top: 4px; }
    .splash-line::after { content:""; display:block; width:42%; height:100%; border-radius:inherit; background:linear-gradient(90deg,var(--accent),var(--accent-2)); animation:splashLoad .8s ease-in-out infinite alternate; }
    @keyframes splashPulse { 0%,100% { transform:scale(1); } 50% { transform:scale(1.035); } }
    @keyframes splashLoad { from { transform:translateX(-15%); } to { transform:translateX(145%); } }

    .page { animation: none; }
    .page.enter-forward { animation: pageForward .24s cubic-bezier(.2,.75,.2,1) both; }
    .page.enter-back { animation: pageBack .24s cubic-bezier(.2,.75,.2,1) both; }
    .page.enter-soft { animation: pageSoft .2s ease both; }
    @keyframes pageForward { from { opacity:0; transform:translateX(10px) translateY(2px); } to { opacity:1; transform:none; } }
    @keyframes pageBack { from { opacity:0; transform:translateX(-10px) translateY(2px); } to { opacity:1; transform:none; } }
    @keyframes pageSoft { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:none; } }

    .interactive-card {
      transform: translateZ(0);
      transition: transform .15s ease, box-shadow .18s ease, border-color .18s ease;
    }
    .interactive-card:active { transform: scale(.992); box-shadow: 0 8px 24px rgba(32,35,52,.075); }
    html[data-theme="dark"] .interactive-card:active { box-shadow: 0 8px 24px rgba(0,0,0,.2); }

    .btn, .nav-btn, .recent-toggle, .chart-toggle, .segmented button,
    details.clean summary, .mini-icon { position: relative; overflow: hidden; isolation: isolate; }
    .ripple-wave {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      background: currentColor;
      opacity: .12;
      transform: scale(0);
      animation: rippleOut .48s ease-out forwards;
      z-index: -1;
    }
    @keyframes rippleOut { to { transform: scale(1); opacity: 0; } }

    .nav-btn.nav-bounce svg { animation: navBounce .32s cubic-bezier(.2,.8,.2,1); }
    @keyframes navBounce { 0% { transform:scale(1); } 45% { transform:scale(1.18) translateY(-1px); } 100% { transform:scale(1); } }

    .number-animating { font-variant-numeric: tabular-nums; }
    .theme-picker { grid-template-columns: repeat(3,minmax(0,1fr)); grid-auto-flow: unset; }
    .theme-picker button { padding-inline: 6px; }

    @media (hover:hover) {
      .btn:hover { transform: translateY(-1px); }
      .interactive-card:hover { transform: translateY(-1px); }
      .nav-btn:hover { color: var(--accent); }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: .01ms !important; animation-iteration-count: 1 !important; scroll-behavior: auto !important; transition-duration: .01ms !important; }
      .splash-screen { display: none; }
    }

  </style>
</head>
<body>

  <div class="splash-screen" id="splashScreen" aria-hidden="true">
    <div class="splash-inner">
      <div class="splash-mark">M</div>
      <div class="splash-title">MSTY <span>PROJECT 1000</span></div>
      <div class="splash-sub">Dividend · Reinvest · Recover</div>
      <div class="splash-line"></div>
    </div>
  </div>
  <main class="app">
    <header class="topbar">
      <div class="brand-wrap">
        <div class="eyebrow">Dividend Recovery Tracker</div>
        <h1 class="brand">MSTY <span>PROJECT 1000</span></h1>
      </div>
      <div class="save-pill" id="saveStatus">준비 중</div>
    </header>

    <section class="page active" id="page-home"></section>
    <section class="page" id="page-trade"></section>
    <section class="page" id="page-dividend"></section>
    <section class="page" id="page-goal"></section>
    <section class="page" id="page-settings"></section>
  </main>

  <nav class="bottom-nav" aria-label="하단 메뉴">

      <svg viewBox="0 0 24 24"><path d="M3 11.5 12 4l9 7.5"/><path d="M5.5 10.5V20h13v-9.5"/><path d="M9.5 20v-6h5v6"/></svg><span>홈</span>
    </button>
    <button class="nav-btn" data-page="trade" aria-label="거래">
      <svg viewBox="0 0 24 24"><path d="M7 7h11"/><path d="m15 4 3 3-3 3"/><path d="M17 17H6"/><path d="m9 14-3 3 3 3"/></svg><span>거래</span>
    </button>
    <button class="nav-btn" data-page="dividend" aria-label="배당">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/><path d="M14.5 9.5c-.6-.7-1.4-1-2.5-1-1.4 0-2.5.7-2.5 1.8 0 2.8 5.2 1.3 5.2 4 0 1.1-1.1 2-2.7 2-1.2 0-2.2-.4-2.9-1.2"/><path d="M12 6.8v10.4"/></svg><span>배당</span>
    </button>
    <button class="nav-btn" data-page="goal" aria-label="목표">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="4"/><path d="M12 2v3"/><path d="M22 12h-3"/></svg><span>목표</span>
    </button>
    <button class="nav-btn" data-page="settings" aria-label="설정">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1-2.8 2.8-.1-.1a1.7 1.7 0 0 0-1.9-.3 1.7 1.7 0 0 0-1 1.6v.2h-4V21a1.7 1.7 0 0 0-1-1.6 1.7 1.7 0 0 0-1.9.3l-.1.1L4.2 17l.1-.1a1.7 1.7 0 0 0 .3-1.9A1.7 1.7 0 0 0 3 14H2.8v-4H3a1.7 1.7 0 0 0 1.6-1 1.7 1.7 0 0 0-.3-1.9l-.1-.1L7 4.2l.1.1a1.7 1.7 0 0 0 1.9.3A1.7 1.7 0 0 0 10 3V2.8h4V3a1.7 1.7 0 0 0 1 1.6 1.7 1.7 0 0 0 1.9-.3l.1-.1L19.8 7l-.1.1a1.7 1.7 0 0 0-.3 1.9 1.7 1.7 0 0 0 1.6 1h.2v4H21a1.7 1.7 0 0 0-1.6 1Z"/></svg><span>설정</span>
    </button>
  </nav>

  <div class="modal-backdrop" id="modalBackdrop" role="dialog" aria-modal="true">
    <div class="modal" id="modal"></div>
  </div>
  <div class="toast" id="toast"></div>
  <input type="file" id="restoreInput" accept="application/json,.json" class="hidden" />

  <script>
  (() => {
    'use strict';


    const APP_BOOT_AT = performance.now();
    const PAGE_ORDER = ['home','trade','dividend','goal','settings'];
    const numberCache = new Map();
    const motionReduced = () => window.matchMedia?.('(prefers-reduced-motion: reduce)').matches;

    function resolvedTheme(pref) {
      return pref === 'dark' || (pref === 'system' && window.matchMedia?.('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
    }
    function applyTheme(pref = state?.settings?.appearance || localStorage.getItem('msty-theme-pref') || 'system') {
      const resolved = resolvedTheme(pref);
      document.documentElement.dataset.theme = resolved;
      try { localStorage.setItem('msty-theme-pref', pref); } catch (_) {}
      const themeMeta = document.querySelector('meta[name="theme-color"]');
      if (themeMeta) themeMeta.setAttribute('content', resolved === 'dark' ? '#0f1117' : '#f4f5f9');
    }
    function haptic(ms=7) {
      try { if ('vibrate' in navigator) navigator.vibrate(ms); } catch (_) {}
    }
    function hideSplash() {
      const el = document.getElementById('splashScreen');
      if (!el) return;
      const wait = motionReduced() ? 0 : Math.max(0, 360 - (performance.now() - APP_BOOT_AT));
      setTimeout(() => {
        el.classList.add('hide');
        setTimeout(() => el.remove(), 240);
      }, wait);
    }
    function addRipple(event) {
      if (motionReduced()) return;
      const target = event.target.closest('.btn,.nav-btn,.recent-toggle,.chart-toggle,.segmented button,details.clean summary,.mini-icon');
      if (!target || target.disabled) return;
      const rect = target.getBoundingClientRect();
      const size = Math.max(rect.width, rect.height) * 1.8;
      const wave = document.createElement('span');
      wave.className = 'ripple-wave';
      wave.style.width = wave.style.height = `${size}px`;
      wave.style.left = `${event.clientX - rect.left - size/2}px`;
      wave.style.top = `${event.clientY - rect.top - size/2}px`;
      target.appendChild(wave);
      wave.addEventListener('animationend', () => wave.remove(), {once:true});
    }
    function markInteractiveCards() {
      document.querySelectorAll('.card').forEach(card => {
        const interactive = card.matches('.recent-box') || card.querySelector('[data-page-jump],details.clean,.chart-toggle,[data-toggle-recent]');
        card.classList.toggle('interactive-card', !!interactive);
      });
    }
    function parseCountable(text) {
      const groups = String(text).match(/-?\d[\d,]*(?:\.\d+)?/g);
      if (!groups || groups.length !== 1 || /\d{4}[.\-/]\d{2}/.test(text)) return null;
      const raw = groups[0];
      const value = Number(raw.replaceAll(',',''));
      if (!Number.isFinite(value)) return null;
      const index = String(text).indexOf(raw);
      const decimals = raw.includes('.') ? raw.split('.')[1].length : 0;
      return {value, decimals, prefix:String(text).slice(0,index), suffix:String(text).slice(index+raw.length)};
    }
    function animateVisibleNumbers(page, fromZero=false) {
      if (motionReduced()) return;
      const root = document.getElementById(`page-${page}`);
      if (!root || !root.classList.contains('active')) return;
      const els = [...root.querySelectorAll('.big-number,.metric-value,.summary-chip .value,.row-value')];
      els.forEach((el,index) => {
        const parsed = parseCountable(el.textContent.trim());
        if (!parsed) return;
        const key = `${page}:${index}:${parsed.prefix}:${parsed.suffix}`;
        const target = parsed.value;
        const start = numberCache.has(key) ? numberCache.get(key) : (fromZero ? 0 : target);
        numberCache.set(key,target);
        if (Math.abs(target-start) < Math.pow(10,-parsed.decimals)) return;
        const duration = 360;
        const began = performance.now();
        el.classList.add('number-animating');
        const format = value => `${parsed.prefix}${value.toLocaleString('en-US',{minimumFractionDigits:parsed.decimals,maximumFractionDigits:parsed.decimals})}${parsed.suffix}`;
        const frame = now => {
          const t = Math.min(1,(now-began)/duration);
          const eased = 1-Math.pow(1-t,3);
          el.textContent = format(start+(target-start)*eased);
          if (t<1) requestAnimationFrame(frame);
          else { el.textContent = format(target); el.classList.remove('number-animating'); }
        };
        requestAnimationFrame(frame);
      });
    }

    const DB_NAME = 'MSTYProject1000DB';
    const DB_VERSION = 1;
    const STORE = 'kv';
    const STATE_KEY = 'state';
    const SAFETY_KEY = 'safetyBackup';

    const todayISO = () => {
      const d = new Date();
      const tz = d.getTimezoneOffset() * 60000;
      return new Date(d.getTime() - tz).toISOString().slice(0,10);
    };
    const uid = () => (crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random().toString(16).slice(2)}`);
    const deepClone = obj => JSON.parse(JSON.stringify(obj));
    const n = v => Number(v) || 0;
    const clamp = (v,min,max) => Math.min(max,Math.max(min,v));
    const round = (v,d=4) => Number(Number(v).toFixed(d));

    const PERSONAL_SEED = null;

    const blankState = () => ({
      version: 2,
      settings: {
        currentPrice: 0,
        targetUnits: 1000,
        monthlyPlanShares: 0,
        projectStart: todayISO(),
        exchangeRate: 1370,
        showKRW: true,
        warningKRW: 18000000,
        thresholdKRW: 20000000,
        appearance: 'system'
      },
      trades: [],
      dividends: [],
      splits: [],
      recovery: {
        locked: false,
        basis: 0,
        startDate: '',
        targetReachedDate: '',
        calculatedBasisAtLock: 0,
        confirmedAt: ''
      },
      meta: {
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString(),
        lastBackupAt: '',
        seedVersion: 0
      }
    });

    const defaultState = () => {
      const base = blankState();
      if (!PERSONAL_SEED) return base;
      base.settings = Object.assign(base.settings, deepClone(PERSONAL_SEED.settings || {}));
      base.trades = deepClone(PERSONAL_SEED.trades || []);
      base.dividends = deepClone(PERSONAL_SEED.dividends || []);
      base.meta.seedVersion = 1;
      return base;
    };

    let db;
    let state;
    let currentPage = 'home';
    let saveTimer;
    let toastTimer;
    const ui = {
      recent: { trade: 1, dividend: 1, log: 1, split: 1 },
      dividendYear: 'all',
      dividendGroup: 'month',
      dividendChartOpen: false,
      checkResults: null
    };

    function openDB() {
      return new Promise((resolve,reject) => {
        const req = indexedDB.open(DB_NAME, DB_VERSION);
        req.onupgradeneeded = () => {
          const database = req.result;
          if (!database.objectStoreNames.contains(STORE)) database.createObjectStore(STORE);
        };
        req.onsuccess = () => { db = req.result; resolve(db); };
        req.onerror = () => reject(req.error);
      });
    }
    function dbGet(key) {
      return new Promise((resolve,reject) => {
        const tx = db.transaction(STORE,'readonly');
        const req = tx.objectStore(STORE).get(key);
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }
    function dbSet(key,value) {
      return new Promise((resolve,reject) => {
        const tx = db.transaction(STORE,'readwrite');
        tx.objectStore(STORE).put(value,key);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    }

    function migrate(raw) {
      if (!raw || typeof raw !== 'object') return defaultState();
      const base = blankState();
      const s = raw;
      s.version = 2;
      s.settings = Object.assign(base.settings, s.settings || {});
      s.trades = Array.isArray(s.trades) ? s.trades : [];
      s.dividends = Array.isArray(s.dividends) ? s.dividends : [];
      s.splits = Array.isArray(s.splits) ? s.splits : [];
      s.recovery = Object.assign(base.recovery, s.recovery || {});
      s.meta = Object.assign(base.meta, s.meta || {});
      return s;
    }

    async function saveState(immediate=false) {
      state.meta.updatedAt = new Date().toISOString();
      setSaveStatus('저장 중');
      clearTimeout(saveTimer);
      const run = async () => {
        try {
          await dbSet(STATE_KEY, state);
          setSaveStatus('저장됨');
        } catch (err) {
          console.error(err);
          setSaveStatus('저장 오류');
          toast('저장 중 오류가 발생했습니다.');
        }
      };
      if (immediate) await run(); else saveTimer = setTimeout(run, 180);
    }

    function setSaveStatus(text) {
      const el = document.getElementById('saveStatus');
      if (el) el.textContent = text;
    }
    function toast(message) {
      haptic(7);
      const el = document.getElementById('toast');
      clearTimeout(toastTimer);
      el.textContent = message;
      el.classList.add('show');
      toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
    }

    const fmtUSD = (v, digits=2) => `${v < 0 ? '-' : ''}$${Math.abs(n(v)).toLocaleString('en-US',{minimumFractionDigits:digits,maximumFractionDigits:digits})}`;
    const fmtKRW = v => `${Math.round(n(v)).toLocaleString('ko-KR')}원`;
    function krwValue(usd) { return n(usd) * Math.max(0,n(state?.settings?.exchangeRate)); }
    function krwRef(usd, cls='') {
      if (!state?.settings?.showKRW || n(state?.settings?.exchangeRate) <= 0) return '';
      return `<div class="krw-ref ${cls}">≈ ${fmtKRW(krwValue(usd))}</div>`;
    }
    function krwMini(usd, cls='') { return krwRef(usd, `mini ${cls}`.trim()); }
    const fmtShares = v => n(v).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:4});
    const fmtPct = v => `${n(v).toLocaleString('ko-KR',{minimumFractionDigits:1,maximumFractionDigits:1})}%`;
    const fmtDate = value => {
      if (!value) return '-';
      const [y,m,d] = value.slice(0,10).split('-');
      return `${y}.${m}.${d}`;
    };
    const esc = s => String(s ?? '').replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
    const signClass = v => n(v) > 0 ? 'positive' : n(v) < 0 ? 'negative' : '';

    function sortedEvents() {
      const trades = state.trades.map(x => ({...x, eventType:'trade'}));
      const splits = state.splits.map(x => ({...x, eventType:'split'}));
      return [...trades,...splits].sort((a,b) => {
        const d = String(a.date).localeCompare(String(b.date));
        if (d) return d;
        const order = (a.eventType === 'split' ? 0 : 1) - (b.eventType === 'split' ? 0 : 1);
        if (order) return order;
        return String(a.createdAt || a.id).localeCompare(String(b.createdAt || b.id));
      });
    }

    function computePortfolio() {
      const targetUnits = Math.max(.000001, n(state.settings.targetUnits));
      let factor = 1;
      let actualShares = 0;
      let normalizedShares = 0;
      let costBasis = 0;
      let realized = 0;
      let directBuyCost = 0;
      let sellProceeds = 0;
      let targetReachedDate = '';
      let targetBasisSuggestion = 0;
      const milestoneDates = {25:'',50:'',75:'',100:''};
      let reinvestNormalized = 0;
      let reinvestAmount = 0;
      let reinvestCount = 0;
      const oversells = [];
      const factorAtDate = [];

      for (const e of sortedEvents()) {
        if (e.eventType === 'split') {
          const ratio = n(e.to) / n(e.from);
          if (ratio > 0 && Number.isFinite(ratio)) {
            actualShares *= ratio;
            factor *= ratio;
          }
        } else if (e.type === 'buy') {
          const q = Math.max(0,n(e.shares));
          const price = Math.max(0,n(e.price));
          actualShares += q;
          normalizedShares += q / factor;
          costBasis += q * price;
          if (e.buyType === 'direct' || e.buyType === 'opening') directBuyCost += q * price;
          if (e.buyType === 'reinvest') {
            reinvestNormalized += q / factor;
            reinvestAmount += q * price;
            reinvestCount += 1;
          }
        } else if (e.type === 'sell') {
          const q = Math.max(0,n(e.shares));
          const price = Math.max(0,n(e.price));
          if (q > actualShares + 1e-8) oversells.push(e);
          const safeQ = Math.min(q, Math.max(0,actualShares));
          const avg = actualShares > 0 ? costBasis / actualShares : 0;
          realized += safeQ * (price - avg);
          costBasis -= safeQ * avg;
          actualShares -= safeQ;
          normalizedShares -= safeQ / factor;
          sellProceeds += safeQ * price;
        }

        factorAtDate.push({date:e.date,factor});
        const progress = normalizedShares / targetUnits;
        for (const pct of [25,50,75,100]) {
          if (!milestoneDates[pct] && progress + 1e-10 >= pct/100) milestoneDates[pct] = e.date;
        }
        if (!targetReachedDate && progress + 1e-10 >= 1) {
          targetReachedDate = e.date;
          targetBasisSuggestion = Math.max(0, directBuyCost - sellProceeds);
        }
      }

      actualShares = Math.abs(actualShares) < 1e-9 ? 0 : actualShares;
      normalizedShares = Math.abs(normalizedShares) < 1e-9 ? 0 : normalizedShares;
      costBasis = Math.max(0, Math.abs(costBasis) < 1e-7 ? 0 : costBasis);
      const currentPrice = Math.max(0,n(state.settings.currentPrice));
      const marketValue = actualShares * currentPrice;
      const unrealized = marketValue - costBasis;
      const avgCost = actualShares > 0 ? costBasis / actualShares : 0;
      const currentTarget = targetUnits * factor;
      const progress = currentTarget > 0 ? actualShares / currentTarget : 0;
      const dividendsTotal = state.dividends.reduce((s,d) => s+n(d.amountUSD),0);
      const currentYear = String(new Date().getFullYear());
      const yearDividends = state.dividends.filter(d => String(d.date).startsWith(currentYear)).reduce((s,d) => s+n(d.amountUSD),0);
      const recentDividend = [...state.dividends].sort((a,b)=>String(b.date).localeCompare(String(a.date)))[0] || null;
      const totalReturn = unrealized + realized + dividendsTotal;
      const investedPrincipal = costBasis;
      const returnPct = investedPrincipal > 0 ? unrealized / investedPrincipal * 100 : 0;
      const reinvestSharesCurrent = reinvestNormalized * factor;
      const reinvestAvgPrice = reinvestSharesCurrent > 0 ? reinvestAmount / reinvestSharesCurrent : 0;
      const dividendAvailable = dividendsTotal - reinvestAmount;

      return {
        factor, actualShares, normalizedShares, costBasis, realized, directBuyCost, sellProceeds,
        marketValue, unrealized, avgCost, currentTarget, progress, currentPrice, investedPrincipal,
        dividendsTotal, yearDividends, recentDividend, totalReturn, returnPct,
        milestoneDates, targetReachedDate, targetBasisSuggestion, reinvestSharesCurrent,
        reinvestAmount, reinvestCount, reinvestAvgPrice, dividendAvailable, oversells, factorAtDate
      };
    }

    function recoveryStats(portfolio) {
      if (!state.recovery.locked) return {dividendRecovery:0,sellRecovery:0,total:0,remaining:0,pct:0,milestones:{}};
      const start = state.recovery.startDate;
      const basis = Math.max(0,n(state.recovery.basis));
      const events = [];
      state.dividends.filter(x => x.date >= start).forEach(x => events.push({date:x.date, amount:n(x.amountUSD), type:'dividend'}));
      state.trades.filter(x => x.type === 'sell' && x.date >= start).forEach(x => events.push({date:x.date, amount:n(x.shares)*n(x.price), type:'sell'}));
      events.sort((a,b)=>String(a.date).localeCompare(String(b.date)));
      let dividendRecovery = 0, sellRecovery = 0, running = 0;
      const milestones = {25:'',50:'',75:'',100:''};
      for (const e of events) {
        if (e.type === 'dividend') dividendRecovery += e.amount;
        else sellRecovery += e.amount;
        running += e.amount;
        for (const p of [25,50,75,100]) if (!milestones[p] && basis > 0 && running/basis >= p/100) milestones[p] = e.date;
      }
      const total = dividendRecovery + sellRecovery;
      return {dividendRecovery,sellRecovery,total,remaining:Math.max(0,basis-total),pct:basis>0?total/basis*100:0,milestones};
    }

    function projectLogs(portfolio, recovery) {
      const logs = [];
      if (state.settings.projectStart) logs.push({id:'start',date:state.settings.projectStart,title:'프로젝트 시작',sub:'MSTY PROJECT 1000 기록을 시작했습니다.'});
      for (const p of [25,50,75,100]) {
        const date = portfolio.milestoneDates[p];
        if (date) logs.push({id:`mile-${p}`,date,title:p===100?'PROJECT1000 달성':`${Math.round(portfolio.currentTarget*p/100).toLocaleString()}주 마일스톤 달성`,sub:`프로젝트 진행률 ${p}%에 도달했습니다.`});
      }
      if (state.recovery.locked) logs.push({id:'recovery-start',date:state.recovery.startDate,title:'원금 회수 시작',sub:`기준원금 ${fmtUSD(state.recovery.basis)} 확정`});
      if (state.recovery.locked) for (const p of [25,50,75,100]) {
        const date = recovery.milestones[p];
        if (date) logs.push({id:`recovery-${p}`,date,title:`원금 회수 ${p}% 달성`,sub:'배당 및 매도 회수액 기준'});
      }
      state.splits.forEach(s => logs.push({id:`split-${s.id}`,date:s.date,title:s.kind==='reverse'?'역분할 반영':'주식분할 반영',sub:`${s.from}주 → ${s.to}주 비율 적용`}));

      const rate = Math.max(0,n(state.settings.exchangeRate));
      const warn = Math.max(0,n(state.settings.warningKRW));
      const threshold = Math.max(0,n(state.settings.thresholdKRW));
      const grouped = {};
      [...state.dividends].sort((a,b)=>String(a.date).localeCompare(String(b.date))).forEach(d => {
        const y = String(d.date).slice(0,4);
        grouped[y] = (grouped[y] || 0) + n(d.amountUSD) * rate;
        if (warn > 0 && grouped[y] >= warn && !logs.some(x=>x.id===`warn-${y}`)) logs.push({id:`warn-${y}`,date:d.date,title:`${y}년 경고금액 도달`,sub:`참고 환율 기준 ${fmtKRW(grouped[y])}`});
        if (threshold > 0 && grouped[y] >= threshold && !logs.some(x=>x.id===`threshold-${y}`)) logs.push({id:`threshold-${y}`,date:d.date,title:`${y}년 관리기준 도달`,sub:`참고 환율 기준 ${fmtKRW(grouped[y])}`});
      });
      return logs.sort((a,b)=>String(b.date).localeCompare(String(a.date)) || String(b.id).localeCompare(String(a.id)));
    }

      let zone = 'green';
      if (krw >= threshold) zone = 'red'; else if (krw >= warning) zone = 'yellow';
      return {krw,warning,threshold,zone,pct:krw/threshold*100,remaining:Math.max(0,threshold-krw)};
    }

          const day = (date.getDay()+6)%7;
          date.setDate(date.getDate()-day);
          key = `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
        }
        map.set(key,(map.get(key)||0)+n(d.amountUSD));
      }
      return [...map.entries()].sort((a,b)=>b[0].localeCompare(a[0]));

    function showPage(page, options={}) {
      const previous = currentPage;
      const shouldResetScroll = options.resetScroll ?? (page !== previous);
      const oldIndex = PAGE_ORDER.indexOf(previous);
      const newIndex = PAGE_ORDER.indexOf(page);
      const direction = page===previous ? 'soft' : (newIndex>=oldIndex ? 'forward' : 'back');
      currentPage = page;
      document.querySelectorAll('.page').forEach(x=>{
        const active=x.id===`page-${page}`;
        x.classList.toggle('active',active);
        x.classList.remove('enter-forward','enter-back','enter-soft');
        if(active){ void x.offsetWidth; x.classList.add(`enter-${direction}`); }
      });
      document.querySelectorAll('.nav-btn').forEach(x=>{
        const active=x.dataset.page===page;
        x.classList.toggle('active',active);
        if(active){ x.classList.remove('nav-bounce'); void x.offsetWidth; x.classList.add('nav-bounce'); }
      });
      haptic(4);
      if (shouldResetScroll) window.scrollTo({top:0,behavior:motionReduced()?'auto':'smooth'});
      requestAnimationFrame(()=>animateVisibleNumbers(page,!numberCache.size));
    }

    function restoreScrollPosition(y) {
      const restore=()=>window.scrollTo({top:y,behavior:'auto'});
      requestAnimationFrame(()=>{restore();requestAnimationFrame(restore);setTimeout(restore,160);});
    }
    function refreshPage(page=currentPage, resetScroll=false) {
      const y = window.scrollY;
      renderAll();
      showPage(page,{resetScroll});
      if (!resetScroll) restoreScrollPosition(y);
    }

    function preserveScroll(action) {
      const y = window.scrollY;
      action();
      restoreScrollPosition(y);
    }

    async function saveTradeForm(ev) {
      ev.preventDefault();
      const fd = new FormData(ev.currentTarget);
      const item = {
        id: fd.get('id') || uid(),
        type: fd.get('type'),
        buyType: fd.get('type')==='buy' ? (fd.get('buyType')||'direct') : '',
        date: fd.get('date'),
        shares: n(fd.get('shares')),
        price: n(fd.get('price')),
        note: String(fd.get('note')||'').trim(),
        createdAt: new Date().toISOString()
      };
      if (!item.date || item.shares<=0 || item.price<0) return toast('입력값을 확인해 주세요.');
      const dup = state.trades.some(x=>x.id!==item.id && x.date===item.date && x.type===item.type && Math.abs(n(x.shares)-item.shares)<1e-8 && Math.abs(n(x.price)-item.price)<1e-8);
      if (dup && !confirm('같은 날짜·주수·단가의 거래가 있습니다. 그래도 저장할까요?')) return;
      const idx = state.trades.findIndex(x=>x.id===item.id);
      if (idx>=0) item.createdAt = state.trades[idx].createdAt || item.createdAt;
      const trial = deepClone(state);
      const trialIdx = trial.trades.findIndex(x=>x.id===item.id);
      if (trialIdx>=0) trial.trades[trialIdx]=item; else trial.trades.push(item);
      const originalState = state;
      state = trial;
      const trialPortfolio = computePortfolio();
      state = originalState;
      if (trialPortfolio.oversells.length) return toast('이 기록을 저장하면 보유주수를 초과하는 매도가 생깁니다. 날짜와 주수를 확인해 주세요.');
      if (idx>=0) state.trades[idx]=item; else state.trades.push(item);
      closeModal();
      await saveState(true);
      refreshPage('trade');
      toast(idx>=0?'거래를 수정했습니다.':'거래를 기록했습니다.');
      maybePromptRecovery();
    }

    function openDividendModal(record=null) {
      openModal(`
        <h3 class="modal-title">${record?'배당 수정':'배당 기록'}</h3>
        <p class="modal-desc">실제로 입금된 세후 배당금만 USD로 기록합니다. 환율은 설정의 참고 환율 하나만 사용합니다.</p>
        <form id="dividendForm" class="form-grid">
          <input type="hidden" name="id" value="${record?.id||''}">
          <div><label class="input-label">지급일</label><input class="input" type="date" name="date" required value="${record?.date||todayISO()}"></div>
          <div><label class="input-label">세후 배당금 USD</label><input class="input" type="number" name="amountUSD" min="0" step="0.0001" required value="${record?.amountUSD??''}" placeholder="0.00"></div>
          <div><label class="input-label">메모 <span class="muted">선택</span></label><input class="input" name="note" maxlength="80" value="${esc(record?.note||'')}" placeholder="짧은 메모"></div>
          <div class="modal-actions"><button type="button" class="btn soft" data-close-modal>취소</button><button class="btn primary" type="submit">${record?'수정 저장':'기록 저장'}</button></div>
        </form>`);
      document.getElementById('dividendForm').addEventListener('submit',saveDividendForm);
      bindModalClose();
    }

    async function saveDividendForm(ev) {
      ev.preventDefault();
      const fd = new FormData(ev.currentTarget);
      const item = {id:fd.get('id')||uid(),date:fd.get('date'),amountUSD:n(fd.get('amountUSD')),note:String(fd.get('note')||'').trim(),createdAt:new Date().toISOString()};
      if (!item.date || item.amountUSD<=0) return toast('지급일과 배당금액을 확인해 주세요.');
      const dup = state.dividends.some(x=>x.id!==item.id && x.date===item.date && Math.abs(n(x.amountUSD)-item.amountUSD)<1e-8);
      if (dup && !confirm('같은 날짜·금액의 배당이 있습니다. 그래도 저장할까요?')) return;
      const idx = state.dividends.findIndex(x=>x.id===item.id);
      if (idx>=0) item.createdAt = state.dividends[idx].createdAt || item.createdAt;
      if (idx>=0) state.dividends[idx]=item; else state.dividends.push(item);
      closeModal(); await saveState(true); refreshPage('dividend'); toast(idx>=0?'배당을 수정했습니다.':'배당을 기록했습니다.');
    }

    function openSplitModal() {
      openModal(`
        <h3 class="modal-title">분할·역분할 기록</h3>
        <p class="modal-desc">예: 2주가 1주가 되면 2 → 1입니다. 보유주수, 평균단가, 목표주수와 마일스톤 진행률을 함께 조정합니다. 현재가와 월 계획주수는 설정에서 직접 확인해 주세요.</p>
        <form id="splitForm" class="form-grid">
          <div><label class="input-label">적용일</label><input class="input" type="date" name="date" required value="${todayISO()}"></div>
          <div class="form-grid two"><div><label class="input-label">기존 주수</label><input class="input" type="number" name="from" min="0.000001" step="0.000001" required value="2"></div><div><label class="input-label">변경 주수</label><input class="input" type="number" name="to" min="0.000001" step="0.000001" required value="1"></div></div>
          <div class="modal-actions"><button type="button" class="btn soft" data-close-modal>취소</button><button class="btn primary" type="submit">조정 적용</button></div>
        </form>`);
      document.getElementById('splitForm').addEventListener('submit',saveSplitForm);
      bindModalClose();
    }
    async function saveSplitForm(ev) {
      ev.preventDefault();
      const fd = new FormData(ev.currentTarget);
      const from=n(fd.get('from')),to=n(fd.get('to')),ratio=to/from;
      if (!fd.get('date')||from<=0||to<=0||!Number.isFinite(ratio)) return toast('분할 비율을 확인해 주세요.');
      const item={id:uid(),date:fd.get('date'),from,to,kind:ratio<1?'reverse':'split',createdAt:new Date().toISOString()};
      state.splits.push(item);
      closeModal(); await saveState(true); refreshPage('settings'); toast(ratio<1?'역분할을 반영했습니다.':'주식분할을 반영했습니다.');
    }

    function bindModalClose() {
      document.querySelectorAll('[data-close-modal]').forEach(x=>x.addEventListener('click',closeModal));
    }

    function confirmRecoveryModal(reset=false) {
      const p = computePortfolio();
      const suggested = reset ? n(state.recovery.basis) : n(p.targetBasisSuggestion);
      const reached = p.targetReachedDate || state.recovery.targetReachedDate || todayISO();
      openModal(`
        <h3 class="modal-title">${reset?'원금회수 기준 재설정':'PROJECT1000 달성'}</h3>
        <p class="modal-desc">직접매수금액에서 목표 달성 전 매도대금을 뺀 금액을 자동 제안합니다. 확정 후에는 기록이 바뀌어도 자동으로 변하지 않습니다.</p>
        <form id="recoveryForm" class="form-grid">
          <div><label class="input-label">원금회수 기준금액 USD</label><input class="input" type="number" name="basis" min="0" step="0.01" required value="${round(suggested,2)}"></div>
          <div><label class="input-label">회수 시작일</label><input class="input" type="date" name="startDate" required value="${reset?(state.recovery.startDate||reached):reached}"></div>
          <div class="check-item" style="background:var(--accent-soft);color:#4d43ca">확정 후 배당과 매도대금은 시작일 이후부터 회수액으로 집계됩니다.</div>
          <div class="modal-actions"><button type="button" class="btn soft" data-close-modal>취소</button><button class="btn green" type="submit">기준금액 확정</button></div>
        </form>`);
      document.getElementById('recoveryForm').addEventListener('submit',async ev=>{
        ev.preventDefault(); const fd=new FormData(ev.currentTarget); const basis=n(fd.get('basis')),startDate=fd.get('startDate');
        if (basis<0||!startDate) return toast('기준금액과 시작일을 확인해 주세요.');
        state.recovery={locked:true,basis,startDate,targetReachedDate:p.targetReachedDate||state.recovery.targetReachedDate||startDate,calculatedBasisAtLock:p.targetBasisSuggestion,confirmedAt:new Date().toISOString()};
        closeModal(); await saveState(true); renderAll(); toast('원금회수 기준을 고정했습니다.');
      });
      bindModalClose();
    }

    function maybePromptRecovery() {
      const p=computePortfolio();
      if (!state.recovery.locked && p.progress>=1) setTimeout(()=>confirmRecoveryModal(false),350);
    }

    function confirmDelete(message,onConfirm) {
      openModal(`<h3 class="modal-title">삭제 확인</h3><p class="modal-desc">${esc(message)}</p><div class="modal-actions"><button class="btn soft" data-close-modal>취소</button><button class="btn danger" id="confirmDeleteBtn">삭제</button></div>`);
      document.getElementById('confirmDeleteBtn').addEventListener('click',async()=>{await onConfirm();closeModal();});
      bindModalClose();
    }

    function bindDynamicEvents() {
      document.querySelectorAll('[data-page-jump]').forEach(x=>x.onclick=()=>showPage(x.dataset.pageJump));
      document.querySelectorAll('details.clean').forEach(d=>{
        const summary=d.querySelector('summary');
        if(summary) {
          const capture=()=>{d.dataset.scrollY=String(window.scrollY);};
          summary.onpointerdown=capture;
          summary.onclick=()=>{capture();restoreScrollPosition(n(d.dataset.scrollY));};
        }
        d.ontoggle=()=>{const y=d.dataset.scrollY===''?window.scrollY:n(d.dataset.scrollY);restoreScrollPosition(y);};
      });
      document.querySelectorAll('[data-open-trade]').forEach(x=>x.onclick=()=>openTradeModal(x.dataset.openTrade));
      document.querySelectorAll('[data-open-dividend]').forEach(x=>x.onclick=()=>openDividendModal());
      document.querySelectorAll('[data-open-split]').forEach(x=>x.onclick=openSplitModal);
      document.querySelectorAll('[data-confirm-recovery]').forEach(x=>x.onclick=()=>confirmRecoveryModal(false));
      document.querySelectorAll('[data-reset-recovery]').forEach(x=>x.onclick=()=>confirmRecoveryModal(true));

      document.querySelectorAll('[data-toggle-recent]').forEach(x=>x.onclick=()=>{
        const type=x.dataset.toggleRecent;
        const box=x.closest('.recent-box');
        const content=box?.querySelector('.recent-content');
        const opening=!(box?.classList.contains('expanded'));
        ui.recent[type]=opening?5:1;
        box?.classList.toggle('expanded',opening);
        content?.classList.toggle('show',opening);
        x.setAttribute('aria-expanded',opening?'true':'false');
        haptic(4);
      });
      document.querySelectorAll('[data-set-recent]').forEach(x=>x.onclick=()=>{ui.recent[x.dataset.setRecent]=n(x.dataset.limit);refreshPage(currentPage);});

      document.querySelectorAll('[data-edit-trade]').forEach(x=>x.onclick=()=>openTradeModal('buy',state.trades.find(t=>t.id===x.dataset.editTrade)));
      document.querySelectorAll('[data-delete-trade]').forEach(x=>x.onclick=()=>confirmDelete('이 거래 기록을 삭제할까요?',async()=>{state.trades=state.trades.filter(t=>t.id!==x.dataset.deleteTrade);await saveState(true);refreshPage('trade');toast('거래를 삭제했습니다.');}));
      document.querySelectorAll('[data-edit-dividend]').forEach(x=>x.onclick=()=>openDividendModal(state.dividends.find(d=>d.id===x.dataset.editDividend)));
      document.querySelectorAll('[data-delete-dividend]').forEach(x=>x.onclick=()=>confirmDelete('이 배당 기록을 삭제할까요?',async()=>{state.dividends=state.dividends.filter(d=>d.id!==x.dataset.deleteDividend);await saveState(true);refreshPage('dividend');toast('배당을 삭제했습니다.');}));
      document.querySelectorAll('[data-delete-split]').forEach(x=>x.onclick=()=>confirmDelete('이 분할 기록을 삭제할까요? 보유주수와 목표 계산이 다시 바뀝니다.',async()=>{state.splits=state.splits.filter(s=>s.id!==x.dataset.deleteSplit);await saveState(true);refreshPage('settings');toast('분할 기록을 삭제했습니다.');}));

      const yearSelect=document.getElementById('dividendYearSelect'); if(yearSelect) yearSelect.onchange=()=>preserveScroll(()=>{ui.dividendYear=yearSelect.value;renderDividend();bindDynamicEvents();});
      document.querySelectorAll('[data-toggle-dividend-chart]').forEach(x=>x.onclick=()=>preserveScroll(()=>{ui.dividendChartOpen=!ui.dividendChartOpen;renderDividend();bindDynamicEvents();}));
      document.querySelectorAll('[data-div-group]').forEach(x=>x.onclick=()=>preserveScroll(()=>{ui.dividendGroup=x.dataset.divGroup;ui.dividendChartOpen=true;renderDividend();bindDynamicEvents();}));

      document.querySelectorAll('[data-theme-choice]').forEach(btn=>btn.onclick=async()=>{
        state.settings.appearance=btn.dataset.themeChoice;
        applyTheme(state.settings.appearance);
        await saveState(true);
        refreshPage('settings');
        toast('화면 모드를 변경했습니다.');
      });

      bindSettingInputs();
      document.querySelectorAll('[data-backup]').forEach(x=>x.onclick=downloadBackup);
      document.querySelectorAll('[data-restore]').forEach(x=>x.onclick=()=>document.getElementById('restoreInput').click());
      document.querySelectorAll('[data-csv]').forEach(x=>x.onclick=exportCSV);
      document.querySelectorAll('[data-project-check]').forEach(x=>x.onclick=()=>preserveScroll(()=>{ui.checkResults=projectCheck();renderSettings();bindDynamicEvents();toast(ui.checkResults.length?`${ui.checkResults.length}개 항목을 확인해 주세요.`:'오류가 발견되지 않았습니다.');}));
      document.querySelectorAll('[data-reset-all]').forEach(x=>x.onclick=()=>confirmDelete('모든 거래·배당·설정·회수 기록을 초기화합니다. 되돌릴 수 없습니다.',async()=>{await dbSet(SAFETY_KEY,deepClone(state));state=blankState();ui.checkResults=null;await saveState(true);renderAll();showPage('home',{resetScroll:true});toast('전체 데이터를 초기화했습니다.');}));
    }

    function bindSettingInputs() {
      const bindings = [
        ['setCurrentPrice','currentPrice',v=>Math.max(0,n(v))],
        ['setMonthlyPlan','monthlyPlanShares',v=>Math.max(0,n(v))],
        ['setProjectStart','projectStart',v=>v],
        ['setExchangeRate','exchangeRate',v=>Math.max(0,n(v))],
        ['setWarningKRW','warningKRW',v=>Math.max(0,n(v))],
        ['setThresholdKRW','thresholdKRW',v=>Math.max(1,n(v))]
      ];
      bindings.forEach(([id,key,cast])=>{const el=document.getElementById(id);if(el)el.onchange=async()=>{state.settings[key]=cast(el.value);await saveState(true);refreshPage('settings');toast('설정을 저장했습니다.');};});
      const target=document.getElementById('setTargetShares'); if(target) target.onchange=async()=>{const value=Math.max(.0001,n(target.value));const factor=currentFactor();state.settings.targetUnits=value/factor;await saveState(true);refreshPage('settings');toast('목표주수를 저장했습니다.');};
      const show=document.getElementById('setShowKRW'); if(show) show.onchange=async()=>{state.settings.showKRW=show.checked;await saveState(true);refreshPage('settings');};
    }

    function projectCheck() {
      const issues=[];
      const p=computePortfolio();
      if (p.actualShares < -1e-8) issues.push('보유주수가 음수입니다. 거래 기록을 확인하세요.');
      if (p.oversells.length) issues.push(`보유량을 초과한 매도 기록이 ${p.oversells.length}건 있습니다.`);
      const badTrade=state.trades.filter(t=>!/^\d{4}-\d{2}-\d{2}$/.test(t.date)||n(t.shares)<=0||n(t.price)<0); if(badTrade.length)issues.push(`날짜·주수·단가가 잘못된 거래가 ${badTrade.length}건 있습니다.`);
      const badDiv=state.dividends.filter(d=>!/^\d{4}-\d{2}-\d{2}$/.test(d.date)||n(d.amountUSD)<=0); if(badDiv.length)issues.push(`날짜·금액이 잘못된 배당이 ${badDiv.length}건 있습니다.`);
      const badSplit=state.splits.filter(s=>!/^\d{4}-\d{2}-\d{2}$/.test(s.date)||n(s.from)<=0||n(s.to)<=0); if(badSplit.length)issues.push(`분할 비율이 잘못된 기록이 ${badSplit.length}건 있습니다.`);
      const tradeKeys=new Set(),tradeDup=[]; state.trades.forEach(t=>{const k=[t.date,t.type,t.buyType,n(t.shares).toFixed(8),n(t.price).toFixed(8)].join('|');if(tradeKeys.has(k))tradeDup.push(t);else tradeKeys.add(k);}); if(tradeDup.length)issues.push(`중복 가능성이 있는 거래가 ${tradeDup.length}건 있습니다.`);
      const divKeys=new Set(),divDup=[]; state.dividends.forEach(d=>{const k=[d.date,n(d.amountUSD).toFixed(8)].join('|');if(divKeys.has(k))divDup.push(d);else divKeys.add(k);}); if(divDup.length)issues.push(`중복 가능성이 있는 배당이 ${divDup.length}건 있습니다.`);
      if (p.targetReachedDate && !state.recovery.locked) issues.push('목표를 달성했지만 원금회수 기준이 아직 확정되지 않았습니다.');
      if (state.recovery.locked && (!state.recovery.startDate || n(state.recovery.basis)<0)) issues.push('원금회수 기준금액 또는 시작일이 올바르지 않습니다.');
      if (state.recovery.locked && Math.abs(n(state.recovery.calculatedBasisAtLock)-n(p.targetBasisSuggestion))>.01) issues.push(`고정 원금과 현재 자동 계산 제안값이 다릅니다. 고정 ${fmtUSD(state.recovery.basis)}, 현재 제안 ${fmtUSD(p.targetBasisSuggestion)}.`);
      if (Math.abs(p.reinvestSharesCurrent)<1e-8 && p.reinvestAmount>0) issues.push('재투자 금액은 있으나 재투자 주수 계산이 0입니다.');
      if (state.meta.lastBackupAt) {
        const days=(Date.now()-new Date(state.meta.lastBackupAt).getTime())/86400000; if(days>60)issues.push(`마지막 백업 후 ${Math.floor(days)}일이 지났습니다.`);
      } else if (state.trades.length+state.dividends.length>0) issues.push('아직 JSON 백업을 만든 적이 없습니다.');
      return issues;
    }

    function downloadFile(filename,content,type='application/octet-stream') {
      const blob=new Blob([content],{type}); const url=URL.createObjectURL(blob); const a=document.createElement('a');a.href=url;a.download=filename;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),1500);
    }
    async function downloadBackup() {
      state.meta.lastBackupAt=new Date().toISOString(); await saveState(true);
      const date=todayISO().replaceAll('-','');
      downloadFile(`MSTY_PROJECT1000_backup_${date}.json`,JSON.stringify(state,null,2),'application/json;charset=utf-8');
      refreshPage('settings');toast('JSON 백업을 저장했습니다.');
    }
    function csvCell(v){const s=String(v??'');return /[",\n]/.test(s)?`"${s.replaceAll('"','""')}"`:s;}
    function exportCSV() {
      const rows=[['구분','ID','날짜','유형','세부유형','주수','단가USD','금액USD','메모','기존주수','변경주수']];
      state.trades.forEach(t=>rows.push(['거래',t.id,t.date,t.type,t.buyType,t.shares,t.price,n(t.shares)*n(t.price),t.note,'','']));
      state.dividends.forEach(d=>rows.push(['배당',d.id,d.date,'dividend','','','',d.amountUSD,d.note,'','']));
      state.splits.forEach(s=>rows.push(['분할',s.id,s.date,s.kind,'','','','','','',s.from,s.to]));
      const csv='\ufeff'+rows.map(r=>r.map(csvCell).join(',')).join('\n');
      downloadFile(`MSTY_PROJECT1000_${todayISO().replaceAll('-','')}.csv`,csv,'text/csv;charset=utf-8');toast('CSV를 저장했습니다.');
    }

    async function restoreFromFile(file) {
      try {
        const text=await file.text(); const parsed=JSON.parse(text);
        if (!parsed || !Array.isArray(parsed.trades) || !Array.isArray(parsed.dividends)) throw new Error('형식 오류');
        await dbSet(SAFETY_KEY,deepClone(state));
        state=migrate(parsed); await saveState(true); ui.checkResults=null; renderAll();showPage('home',{resetScroll:true});toast('백업을 복원했습니다.');
      } catch(err) {console.error(err);toast('올바른 백업 파일이 아닙니다.');}
    }

    function bindStaticEvents() {
      document.addEventListener('pointerdown',addRipple,{passive:true});
      const themeMedia=window.matchMedia?.('(prefers-color-scheme: dark)');
      themeMedia?.addEventListener?.('change',()=>{if((state.settings.appearance||'system')==='system')applyTheme('system');});
      document.querySelectorAll('.nav-btn').forEach(btn=>btn.addEventListener('click',()=>showPage(btn.dataset.page)));
      document.getElementById('modalBackdrop').addEventListener('click',e=>{if(e.target.id==='modalBackdrop')closeModal();});
      document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
      document.getElementById('restoreInput').addEventListener('change',e=>{const file=e.target.files?.[0];if(file)restoreFromFile(file);e.target.value='';});
    }

    async function init() {
      try {
        await openDB();
        state=migrate(await dbGet(STATE_KEY));
        applyTheme(state.settings.appearance||'system');
        await saveState(true);
        renderAll();
        bindStaticEvents();
        showPage('home',{resetScroll:true});
        hideSplash();
        if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
          navigator.serviceWorker.register('./sw.js').catch(err=>console.warn('SW registration failed',err));
        }
      } catch(err) {
        console.error(err);
        document.getElementById('page-home').innerHTML=`<div class="card danger"><div class="card-title">저장소를 열 수 없습니다.</div><p class="tiny">브라우저의 시크릿 모드가 아닌 일반 모드에서 다시 열어 주세요.</p></div>`;
        setSaveStatus('오류');
        hideSplash();
      }
    }

    init();
  })();
  </script>
</body>
</html>
